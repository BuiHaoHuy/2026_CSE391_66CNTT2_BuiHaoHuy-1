<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Goals</title>

<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700&family=Oleo+Script:wght@700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Quicksand',sans-serif;
  background:#f4f7fa;
  color:#333;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 8%;
  position:fixed;
  width:100%;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(6px);
}

#page-logo a{
  font-family:'Oleo Script',cursive;
  font-size:28px;
  color:white;
  text-decoration:none;
}

nav ul{
  display:flex;
  list-style:none;
  gap:30px;
}

nav a{
  text-decoration:none;
  color:white;
  font-weight:500;
  transition:0.3s;
}

nav a:hover{
  color:#00e0ff;
}

/* HERO */
#hero{
  height:100vh;
  background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
  url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

#hero-content{
  color:white;
}

#hero-content h1{
  font-family:'Raleway',sans-serif;
  font-size:50px;
  margin-bottom:20px;
}

#hero-content p{
  font-size:20px;
  margin-bottom:30px;
}

#hero-content a{
  padding:12px 25px;
  background:#00e0ff;
  color:black;
  font-weight:bold;
  border-radius:30px;
  text-decoration:none;
  transition:0.3s;
}

#hero-content a:hover{
  background:white;
}

/* HIGHLIGHTS */
#highlights{
  padding:80px 8%;
  text-align:center;
}

#highlights h2{
  font-size:32px;
  margin-bottom:40px;
}

#destinations{
  display:flex;
  justify-content:center;
  gap:30px;
  list-style:none;
  flex-wrap:wrap;
}

.destination{
  background:white;
  border-radius:15px;
  overflow:hidden;
  width:300px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  transition:0.3s;
}

.destination:hover{
  transform:translateY(-10px);
}

.destination img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.destination p{
  padding:15px;
  font-size:18px;
}

/* FOOTER */
footer{
  background:#111;
  padding:20px;
  text-align:center;
}

footer ul{
  display:flex;
  justify-content:center;
  gap:20px;
  list-style:none;
}

footer img{
  width:30px;
  transition:0.3s;
}

footer img:hover{
  transform:scale(1.2);
}
</style>
</head>

<body>

<header>
  <div id="page-logo">
    <a href="#">Travel Goals</a>
  </div>
  <nav>
    <ul>
      <li><a href="#">Destinations</a></li>
      <li><a href="#">About</a></li>
    </ul>
  </nav>
</header>

<main>

<section id="hero">
  <div id="hero-content">
    <h1>Joe's Travel Page</h1>
    <p>Let's explore the world together!</p>
    <a href="#">Discover places</a>
  </div>
</section>

<section id="highlights">
  <h2>Highlights</h2>
  <ul id="destinations">
    <li class="destination">
      <img src="https://images.unsplash.com/photo-1499793983690-e29da59ef1c2" alt="Miami">
      <p>Miami <strong>USA</strong></p>
    </li>
    <li class="destination">
      <img src="https://images.unsplash.com/photo-1467269204594-9661b134dd2b" alt="Munich">
      <p>Munich <strong>Germany</strong></p>
    </li>
    <li class="destination">
      <img src="https://images.unsplash.com/photo-1505731132164-cca1d50e2b86" alt="Barcelona">
      <p>Barcelona <strong>Spain</strong></p>
    </li>
  </ul>
</section>

</main>

<footer>
  <ul>
    <li>
      <a href="https://www.instagram.com">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
      </a>
    </li>
    <li>
      <a href="https://www.facebook.com">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
      </a>
    </li>
  </ul>
</footer>

</body>
</html>
